name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint-and-test:
    name: Lint, Type-check & Unit Tests
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Set up Java 11 (for PySpark)
        uses: actions/setup-java@v4
        with:
          java-version: "11"
          distribution: "temurin"

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Lint — ruff
        run: ruff check spark/ airflow/ kafka/ tests/

      - name: Format check — black
        run: black --check spark/ airflow/ kafka/ tests/

      - name: Type check — mypy
        run: mypy spark/ --ignore-missing-imports

      - name: Unit tests with coverage
        env:
          PYSPARK_PYTHON: python3
          JAVA_HOME: ${{ env.JAVA_HOME }}
        run: |
          pytest tests/unit/ -v \
            --cov=spark \
            --cov-report=xml \
            --cov-report=term-missing \
            --junitxml=reports/junit.xml

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v4
        with:
          file: ./coverage.xml
          fail_ci_if_error: false

      - name: Upload test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-results
          path: reports/junit.xml

  dbt-validate:
    name: dbt Compile & Test
    runs-on: ubuntu-latest
    needs: lint-and-test

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dbt
        run: pip install dbt-core==1.7.8 dbt-redshift==1.7.4

      - name: dbt deps
        working-directory: dbt
        run: dbt deps

      - name: dbt compile (validates SQL syntax)
        working-directory: dbt
        env:
          DBT_PII_SALT: "ci-test-salt"
        run: dbt compile --profiles-dir . --target ci

      - name: dbt test (schema tests only — no live DB)
        working-directory: dbt
        env:
          DBT_PII_SALT: "ci-test-salt"
        run: dbt parse --profiles-dir . --target ci

  security-scan:
    name: Security Scan
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Run Bandit (Python security linter)
        uses: PyCQA/bandit-action@v1
        with:
          targets: "spark/ kafka/ airflow/"
          level: HIGH
          confidence: HIGH

      - name: Run Trivy (dependency vulnerabilities)
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: fs
          scan-ref: "."
          severity: "CRITICAL,HIGH"
          exit-code: "0"   # Warn only in CI, block in release

      - name: Detect secrets (gitleaks)
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  terraform-validate:
    name: Terraform Validate
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.7.0"

      - name: Terraform fmt check
        run: terraform fmt -check -recursive terraform/

      - name: Terraform validate (dev)
        run: |
          cd terraform/environments/dev
          terraform init -backend=false
          terraform validate

  dag-integrity:
    name: Airflow DAG Integrity
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install Airflow
        run: |
          pip install "apache-airflow[amazon,apache.spark]==2.8.3" \
            --constraint "https://raw.githubusercontent.com/apache/airflow/constraints-2.8.3/constraints-3.11.txt"

      - name: Test DAG imports
        env:
          AIRFLOW__CORE__UNIT_TEST_MODE: "True"
          AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: "sqlite:///airflow_test.db"
        run: |
          airflow db init
          python -c "
          from airflow.models import DagBag
          bag = DagBag(dag_folder='airflow/dags', include_examples=False)
          assert not bag.import_errors, f'DAG import errors: {bag.import_errors}'
          print(f'✅ {len(bag.dags)} DAGs loaded successfully')
          "
